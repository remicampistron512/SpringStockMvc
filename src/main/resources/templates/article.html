<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="layout">

<head>
  <meta charset="utf-8">
  <title>Saisir un article</title>
</head>

<body>
<div layout:fragment="content">

  <div class="row justify-content-center mt-4">
    <div class="col-md-6 col-lg-4">

      <div class="card shadow-sm">
        <div class="card-header bg-primary text-white">
          Saisir nouvel article
        </div>

        <div class="card-body">
          <form th:action="@{/save}" method="post" th:object="${article}">

            <div class="mb-3">
              <label class="form-label">Description :</label>
              <input class="form-control" type="text" th:field="*{description}">
              <div class="text-danger" th:errors="*{description}"></div>
            </div>

            <div class="mb-3">
              <label class="form-label">Price :</label>
              <input class="form-control" type="text" th:field="*{price}">
              <div class="text-danger" th:errors="*{price}"></div>
            </div>
            <div class="mb-3">
              <label class="form-label">Catégorie</label>
              <select class="form-select" aria-label="Selection catégorie">
                <option th:each="c : ${listCategories}" class="nav-item" value="${c.id}" th:text="${c.name}"></option>
              </select>


            </div>

            <button type="submit" class="btn btn-primary w-100">
              Save
            </button>

          </form>
        </div>
      </div>

    </div>
  </div>

</div>
</body>
</html>
