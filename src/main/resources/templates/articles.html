<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="layout">

<head>
  <meta charset="UTF-8">
  <title>Mes articles</title>
</head>

<body>
<div layout:fragment="content">

  <div class="row justify-content-center mt-4">
    <div class="col-12 col-lg-10">

      <div class="card shadow-sm">
        <div th:text="${currentCategoryName}" class="card-header bg-primary text-white">
        </div>

        <div class="card-body">

          <form th:action="@{/index}" method="get" class="row g-3 align-items-end mb-4">
            <div class="col-md-6">
              <label for="keyword" class="form-label">Mot clé</label>
              <input id="keyword"
                     type="text"
                     name="keyword"
                     class="form-control"
                     th:value="${keyword}">
            </div>
            <div class="col-md-auto">
              <button type="submit" class="btn btn-primary">
                Rechercher
              </button>
            </div>
          </form>

          <div class="table-responsive">
            <table class="table table-bordered table-hover align-middle">
              <thead class="table-light">
              <tr>
                <th>Id</th>
                <th>Description</th>
                <th>Prix</th>
                <th>Acheter</th>
                <th>Modifier</th>
                <th>Supprimer</th>
              </tr>
              </thead>
              <tbody>
              <tr th:each="a : ${listArticle}">
                <td th:text="${a.id}"></td>
                <td th:text="${a.description}"></td>
                <td th:text="${a.price}"></td>
                <td>
                  <form th:action="@{/addToCart}" method="post" class="row g-3 align-items-end mb-4">

                    <input type="hidden" name="articleId" th:value="${a.id}">
                    <div class="col-auto">
                      <button type="submit" class="btn btn-primary">
                        Ajouter au panier
                      </button>
                    </div>
                    <div class="col-auto">
                      <input type="number" name="quantity" value="1" min="1" class="form-control">
                    </div>



                  </form>
                  </form>
                </td>
                <td>
                  <a th:href="@{/editArticle(id=${a.id})}" class="btn btn-sm btn-primary">Modifier</a>
                </td>
                <td>
                  <a class="btn btn-sm btn-danger"
                     th:href="@{/delete(id=${a.id}, page=${currentPage}, keyword=${keyword})}">
                    Supprimer
                  </a>
                </td>

              </tr>
              </tbody>
            </table>
          </div>

          <nav th:if="${pages != null and #arrays.length(pages) > 0}" aria-label="Pagination des articles">
            <ul class="pagination justify-content-center mt-4">
              <li class="page-item"
                  th:each="page, status : ${pages}"
                  th:classappend="${currentPage == status.index} ? ' active' : ''">
                <a class="page-link"
                   th:href="@{/index(page=${status.index}, keyword=${keyword})}"
                   th:text="${status.index + 1}"></a>
              </li>
            </ul>
          </nav>

        </div>
      </div>

    </div>
  </div>

</div>
</body>
</html>
