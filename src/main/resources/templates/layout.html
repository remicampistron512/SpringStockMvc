<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mon site demo</title>

  <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<header>
  <nav class="navbar navbar-expand-lg navbar-light bg-light border-bottom">
    <div class="container">
      <a class="navbar-brand" th:href="@{/index}">Mon site demo</a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="mainNavbar">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item">
            <a class="nav-link" th:href="@{/index}">Accueil</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" th:href="@{/article}">Article</a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="#">Page 2</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#">Page 3</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>
</header>
<nav aria-label="categories" class="navbar navbar-expand-lg navbar-light bg-light border-bottom">
  <div class="container">
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
    <li th:each="c : ${listCategories}" class="nav-item">
      <a class="nav-link" th:href="@{/index(categoryId=${c.id})}" th:text="${c.name}">

      </a>
    </li>
    </ul>
    </div>
  </div>
</nav>

<main class="container py-4">
  <section layout:fragment="content">
    <!-- Page content -->
  </section>
</main>

</body>
</html>
